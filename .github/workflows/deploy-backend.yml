# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Deploy Azure Function App using zip deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and Deploy Backend Function App

on:
  push:
    branches:
      - main
    paths:
      - 'src/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'red-scus-budgetbackend-demo'
  AZURE_RESOURCE_GROUP: 'red-scus-budgetbackend-demo-rg'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'src/backend/BudgetTracker.Functions/'
  DOTNET_VERSION: '9.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Restore test dependencies
        run: dotnet restore
        working-directory: src/backend/BudgetTracker.Functions.Tests/

      - name: Build with dotnet
        run: dotnet build --configuration Release --no-restore 
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Build test project
        run: dotnet build --configuration Release --no-restore
        working-directory: src/backend/BudgetTracker.Functions.Tests/

      - name: Run unit tests
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults --logger "trx;LogFileName=test-results.trx"
        working-directory: src/backend/BudgetTracker.Functions.Tests/

      - name: Generate code coverage report
        if: always()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool --version 5.4.5
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          reportgenerator -reports:"./TestResults/**/coverage.cobertura.xml" -targetdir:"./TestResults/CoverageReport" -reporttypes:"MarkdownSummaryGithub;Cobertura"
          cat ./TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        working-directory: src/backend/BudgetTracker.Functions.Tests/

      - name: Upload test results and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-and-coverage
          path: |
            src/backend/BudgetTracker.Functions.Tests/TestResults/**/*.trx
            src/backend/BudgetTracker.Functions.Tests/TestResults/**/coverage.cobertura.xml
            src/backend/BudgetTracker.Functions.Tests/TestResults/CoverageReport/

      - name: Publish Function App
        run: dotnet publish -c Release -o ./output
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Create .azurefunctions directory for Flex Consumption
        run: |
          mkdir -p ./output/.azurefunctions
          echo '{"version":"1.0.0"}' > ./output/.azurefunctions/metadata.json
          ls -la ./output
          ls -la ./output/.azurefunctions
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: prod
      url: ${{ steps.deploy-to-function.outputs.webapp-url }}
    permissions:
      id-token: write

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./function-app

      - name: Verify package structure
        run: |
          echo "Listing package contents:"
          ls -laR ./function-app
          echo "Checking for .azurefunctions directory:"
          if [ -d "./function-app/.azurefunctions" ]; then
            echo ".azurefunctions directory exists"
            cat ./function-app/.azurefunctions/metadata.json
          else
            echo "ERROR: .azurefunctions directory NOT found"
          fi

      - name : Login to Azure
        uses: Azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ENTRA_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App
        id: deploy-to-function
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./function-app

      - name: Smoke test — API health check
        run: |
          # Query the real hostname — Flex Consumption uses a random-suffix URL, not <name>.azurewebsites.net
          HOSTNAME=$(az functionapp show \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "defaultHostName" -o tsv)
          API_URL="https://${HOSTNAME}/api/budgets"
          echo "Smoke testing: $API_URL"
          echo "Waiting 30s for app to be ready..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$API_URL" 2>/dev/null) || STATUS=000
          echo "Health check returned HTTP $STATUS"
          if [[ ! "$STATUS" =~ ^[23][0-9]{2}$ ]]; then
            echo "::error::Smoke test failed — $API_URL returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ Backend API is healthy (HTTP $STATUS)" >> $GITHUB_STEP_SUMMARY
